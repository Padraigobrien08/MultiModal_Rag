name: Container Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly rescan so newly published CVEs in unchanged images are caught.
    - cron: "27 4 * * 2"

# Non-blocking: base-image OS packages routinely carry unfixed CVEs that would
# produce false-positive failures, so results are reported to the Security tab
# (exit-code 0) rather than gating merges. `ignore-unfixed` trims the noise.
permissions:
  contents: read

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Trivy (${{ matrix.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            context: .
            dockerfile: Dockerfile
          - name: web
            context: web
            dockerfile: web/Dockerfile
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build -t local/${{ matrix.name }}:${{ github.sha }} -f ${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: local/${{ matrix.name }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}
