name: Dependency Review

on:
  pull_request:
    branches: [main]

# Gating check: fails the PR when a dependency introducing a high+ severity
# vulnerability (or a non-permitted license) is added. Low false-positive rate,
# so it is safe to make required in branch protection.
permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
