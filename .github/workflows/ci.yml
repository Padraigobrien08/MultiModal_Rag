name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff
        run: python3 -m ruff check stepwise tests scripts

      - name: Pytest
        run: python3 -m pytest tests/ -q

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  docker:
    name: Docker Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build backend image
        run: docker build -t stepwise-api:ci .

      - name: Build frontend image
        run: docker build -t stepwise-web:ci ./web

      # Boot the backend with throwaway env vars. The dummy key is never used —
      # /health needs nothing, and /ready only touches the SQLite dir and a fresh
      # Chroma path (both writable in the container) without loading any models.
      # Polling is disabled so no background source fetches run during the probe.
      - name: Run backend container
        run: |
          docker run -d --name stepwise-api -p 8000:8000 \
            -e ANTHROPIC_API_KEY=ci-not-a-real-key \
            -e WATCHER_POLL_ENABLED=false \
            stepwise-api:ci

      - name: Probe /health and /ready
        run: |
          set -euo pipefail

          # Wait for the server to accept connections (up to ~30s).
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::/health did not come up within 30s"
              exit 1
            fi
            sleep 1
          done

          echo "== /health =="
          health=$(curl -fsS http://localhost:8000/health)
          echo "$health"
          echo "$health" | grep -q '"status":"ok"'

          echo "== /ready =="
          # /ready returns 200 when the DB and Chroma are reachable, 503 otherwise.
          code=$(curl -sS -o /tmp/ready.json -w '%{http_code}' http://localhost:8000/ready)
          cat /tmp/ready.json; echo
          if [ "$code" != "200" ]; then
            echo "::error::/ready returned HTTP $code"
            exit 1
          fi

      - name: Backend container logs
        if: always()
        run: docker logs stepwise-api || true
