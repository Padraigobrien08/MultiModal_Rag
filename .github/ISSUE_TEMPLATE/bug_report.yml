name: Bug report
description: Report something that isn't working as documented
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please search
        [existing issues](https://github.com/Padraigobrien08/MultiModal_Rag/issues)
        first to avoid duplicates.

        Do **not** report security vulnerabilities here — follow
        [SECURITY.md](https://github.com/Padraigobrien08/MultiModal_Rag/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I ingest a YouTube URL, ...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `stepwise ingest "..."`
        2. Query "..."
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Stepwise version (e.g. 0.1.0) or the commit SHA you're running.
      placeholder: "0.1.0 or abc1234"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Stepwise is affected?
      options:
        - Backend / API
        - Ingestion (YouTube / Drive / Notion / images)
        - Retrieval / query
        - Frontend (web)
        - Zendesk app
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: How are you running it?
      options:
        - Local (venv + npm)
        - Docker Compose
        - Railway
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error output. This is automatically formatted as code.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am not reporting a security vulnerability (those go through SECURITY.md).
          required: true
